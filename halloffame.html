<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Hollow Hour - Hall of Fame</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Creepster&family=Special+Elite&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #050000;
            font-family: 'Special Elite', cursive;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            color: #aaa;
        }

        h1 {
            font-family: 'Creepster', cursive;
            font-size: clamp(2.5rem, 8vw, 5rem);
            color: #c00;
            text-shadow: 0 0 20px rgba(180, 0, 0, 0.8);
            margin-bottom: 40px;
            letter-spacing: 0.1em;
            text-align: center;
        }

        .leaderboard {
            width: 100%;
            max-width: 700px;
            border-collapse: separate;
            border-spacing: 0 8px;
            margin-bottom: 40px;
        }

        .leaderboard th {
            font-family: 'Creepster', cursive;
            font-size: 1.5rem;
            color: #c00;
            text-shadow: 0 0 10px rgba(180, 0, 0, 0.6);
            padding: 15px;
            border-bottom: 3px solid #5c0000;
            text-align: center;
            letter-spacing: 0.1em;
        }

        .leaderboard td {
            padding: 18px 15px;
            text-align: center;
            font-size: 1.2rem;
            border: 3px solid #1a0000;
            border-radius: 4px;
            background: rgba(10, 0, 0, 0.6);
            transition: all 0.3s ease;
            position: relative;
        }

        .leaderboard tr:hover td {
            background: rgba(180, 0, 0, 0.08);
            border-color: #5c0000;
        }

        .rank {
            font-family: 'Creepster', cursive;
            font-size: 1.8rem;
            color: #c00;
            text-shadow: 0 0 8px rgba(180, 0, 0, 0.5);
        }

        .name {
            font-family: 'Creepster', cursive;
            font-size: 1.6rem;
            color: #e0e0e0;
            text-shadow: 0 0 8px rgba(180, 0, 0, 0.4);
        }

        .first-place td {
            border: 4px solid #ffd700;
            background: rgba(20, 15, 0, 0.8);
            box-shadow: 
                0 0 15px rgba(255, 215, 0, 0.3),
                inset 0 0 20px rgba(255, 215, 0, 0.1);
            position: relative;
        }

        .first-place td::before {
            content: '';
            position: absolute;
            top: 4px;
            left: 4px;
            right: 4px;
            bottom: 4px;
            border: 1px solid rgba(255, 215, 0, 0.4);
            border-radius: 2px;
            pointer-events: none;
        }

        .first-place .rank {
            font-size: 2.2rem;
            color: #ffd700;
            text-shadow: 
                0 0 10px rgba(255, 215, 0, 0.8),
                0 0 20px rgba(255, 215, 0, 0.6);
            animation: goldGlow 2s ease-in-out infinite;
        }

        .first-place .name {
            font-size: 2rem;
            color: #ffd700;
            text-shadow: 
                0 0 10px rgba(255, 215, 0, 0.8),
                0 0 20px rgba(255, 215, 0, 0.6),
                0 0 40px rgba(255, 215, 0, 0.4);
            animation: goldGlow 2s ease-in-out infinite;
        }

        .second-place td {
            border: 4px solid #c0c0c0;
            background: rgba(15, 15, 15, 0.8);
            box-shadow: 
                0 0 15px rgba(192, 192, 192, 0.2),
                inset 0 0 20px rgba(192, 192, 192, 0.05);
            position: relative;
        }

        .second-place td::before {
            content: '';
            position: absolute;
            top: 4px;
            left: 4px;
            right: 4px;
            bottom: 4px;
            border: 1px solid rgba(192, 192, 192, 0.3);
            border-radius: 2px;
            pointer-events: none;
        }

        .second-place .rank {
            font-size: 2rem;
            color: #c0c0c0;
            text-shadow: 
                0 0 10px rgba(192, 192, 192, 0.8),
                0 0 20px rgba(192, 192, 192, 0.6);
            animation: silverGlow 2s ease-in-out infinite;
        }

        .second-place .name {
            font-size: 1.8rem;
            color: #c0c0c0;
            text-shadow: 
                0 0 10px rgba(192, 192, 192, 0.8),
                0 0 20px rgba(192, 192, 192, 0.6),
                0 0 40px rgba(192, 192, 192, 0.4);
            animation: silverGlow 2s ease-in-out infinite;
        }

        .third-place td {
            border: 4px solid #cd7f32;
            background: rgba(20, 12, 0, 0.8);
            box-shadow: 
                0 0 15px rgba(205, 127, 50, 0.2),
                inset 0 0 20px rgba(205, 127, 50, 0.05);
            position: relative;
        }

        .third-place td::before {
            content: '';
            position: absolute;
            top: 4px;
            left: 4px;
            right: 4px;
            bottom: 4px;
            border: 1px solid rgba(205, 127, 50, 0.3);
            border-radius: 2px;
            pointer-events: none;
        }

        .third-place .rank {
            font-size: 2rem;
            color: #cd7f32;
            text-shadow: 
                0 0 10px rgba(205, 127, 50, 0.8),
                0 0 20px rgba(205, 127, 50, 0.6);
            animation: bronzeGlow 2s ease-in-out infinite;
        }

        .third-place .name {
            font-size: 1.8rem;
            color: #cd7f32;
            text-shadow: 
                0 0 10px rgba(205, 127, 50, 0.8),
                0 0 20px rgba(205, 127, 50, 0.6),
                0 0 40px rgba(205, 127, 50, 0.4);
            animation: bronzeGlow 2s ease-in-out infinite;
        }

        .rank-cell {
            border-right: 2px solid rgba(255, 255, 255, 0.1) !important;
        }

        .leaderboard tr:last-child td {
            border-bottom: 4px solid #5c0000;
        }

        .leaderboard thead tr {
            border-bottom: 4px solid #5c0000;
        }

        @keyframes goldGlow {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(1.3); }
        }

        @keyframes goldBorder {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes silverGlow {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(1.3); }
        }

        @keyframes silverBorder {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes bronzeGlow {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(1.3); }
        }

        @keyframes bronzeBorder {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .back-btn {
            padding: 15px 40px;
            font-family: 'Creepster', cursive;
            font-size: 1.3rem;
            letter-spacing: 0.2em;
            color: #f0f0f0;
            background: linear-gradient(180deg, #8b0000, #5c0000);
            border: 2px solid #ff0000;
            border-radius: 6px;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.4);
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .back-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.6);
        }

        .crown {
            font-size: 2rem;
            margin-right: 10px;
        }

        @media (max-width: 600px) {
            .leaderboard {
                font-size: 1rem;
            }
            
            .leaderboard th,
            .leaderboard td {
                padding: 12px 8px;
                font-size: 1rem;
            }
            
            .first-place .name {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <h1>HALL OF FAME</h1>
    
        <table class="leaderboard">
        <thead>
            <tr>
                <th>RANK</th>
                <th>NAME</th>
            </tr>
        </thead>
        <tbody>
            <tr class="first-place">
                <td class="rank rank-cell">1</td>
                <td class="name">Shishir Rai</td>
            </tr>
            <tr class="second-place">
                <td class="rank rank-cell">2</td>
                <td class="name">Hollow</td>
            </tr>
            <tr class="third-place">
                <td class="rank rank-cell">3</td>
                <td class="name">Hollow</td>
            </tr>
            <tr>
                <td class="rank rank-cell">4</td>
                <td class="name">Hollow</td>
            </tr>
            <tr>
                <td class="rank rank-cell">5</td>
                <td class="name">Hollow</td>
            </tr>
            <tr>
                <td class="rank rank-cell">6</td>
                <td class="name">Hollow</td>
            </tr>
            <tr>
                <td class="rank rank-cell">7</td>
                <td class="name">Hollow</td>
            </tr>
            <tr>
                <td class="rank rank-cell">8</td>
                <td class="name">Hollow</td>
            </tr>
            <tr>
                <td class="rank rank-cell">9</td>
                <td class="name">Hollow</td>
            </tr>
            <tr>
                <td class="rank rank-cell">10</td>
                <td class="name">Hollow</td>
            </tr>
        </tbody>
    </table>

    <a href="index.html" class="back-btn">BACK TO GAME</a>
</body>
</html>
